<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統計データ会員ポータル</title>
<style>
  :root{
    --ink:#1a2530;
    --ink-soft:#5a6470;
    --paper:#ffffff;
    --paper-line:#e6e9ec;
    --grid:#dfe3e6;
    --accent:#02a0ab;
    --accent-dark:#017f88;
    --accent-soft:#e5f5f6;
    --gold:#02a0ab;
    --alert:#c0392b;
    --white:#ffffff;
    --shade:#f6f8f9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Yu Gothic","游ゴシック",YuGothic,"Yu Gothic Medium",Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.6;
    min-height:100vh;
  }
  .mono{font-family:Arial,"Yu Gothic",sans-serif;font-variant-numeric:tabular-nums}

  /* ===== ヘッダー ===== */
  header{
    background:var(--white);
    color:var(--ink);
    border-bottom:3px solid var(--accent);
  }
  .head-inner{
    max-width:1080px;margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .logo{font-size:20px;font-weight:700;letter-spacing:.08em}
  .logo .mark{color:var(--accent)}
  .head-sub{font-size:12px;color:var(--ink-soft);letter-spacing:.15em}
  /* 右上のアカウント表示 */
  .head-account{
    margin-left:auto;display:none;align-items:center;gap:14px;font-size:13px;
  }
  .head-account .user{color:var(--ink-soft)}
  .head-account .user b{color:var(--accent)}
  .head-account .logout{
    font-size:12px;padding:7px 14px;background:none;
    border:1px solid var(--grid);color:var(--ink-soft);
    cursor:pointer;border-radius:2px;
  }
  .head-account .logout:hover{border-color:var(--ink-soft);color:var(--ink)}

  main{max-width:1080px;margin:0 auto;padding:32px 24px 64px}

  /* ===== ログイン画面 ===== */
  .login-wrap{
    max-width:336px;margin:34px auto 48px;
    background:var(--white);
    border:1px solid var(--paper-line);
    border-top:4px solid var(--accent);
    box-shadow:0 12px 30px rgba(18,33,58,.08);
  }
  .login-head{padding:26px 32px 4px}
  .login-eyebrow{font-size:11px;letter-spacing:.28em;color:var(--gold);font-weight:700}
  .login-head h1{font-size:22px;margin-top:8px;letter-spacing:.04em}
  .login-head p{font-size:13px;color:var(--ink-soft);margin-top:6px}
  .login-body{padding:14px 32px 32px}
  .field{margin-top:18px}
  .field label{display:block;font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:6px}
  .field input{
    width:100%;padding:11px 12px;font-size:15px;
    border:1px solid var(--grid);background:var(--shade);
    color:var(--ink);border-radius:2px;
  }
  .field input:focus{outline:2px solid var(--accent);outline-offset:1px;background:#fff}
  .field input::placeholder{color:#c4cace}
  .btn{
    width:100%;margin-top:24px;padding:13px;
    background:var(--accent);color:#fff;border:none;
    font-size:15px;font-weight:700;letter-spacing:.12em;
    cursor:pointer;border-radius:2px;transition:background .15s;
  }
  .btn:hover{background:var(--accent-dark)}
  .btn:active{transform:translateY(1px)}
  .err{
    margin-top:16px;padding:10px 14px;background:#f7e9e6;
    border-left:3px solid var(--alert);color:var(--alert);
    font-size:13px;display:none;
  }

  /* ===== アプリ本体 ===== */
  .app{display:none}

  /* ナビ（データページのタブ的リンク） */
  .pagenav{
    display:flex;gap:4px;flex-wrap:wrap;
    border-bottom:2px solid var(--accent);margin-bottom:28px;
  }
  .pagenav button{
    background:none;border:none;padding:11px 16px;font-size:13px;
    font-weight:700;letter-spacing:.04em;color:var(--ink-soft);cursor:pointer;
    border-bottom:3px solid transparent;margin-bottom:-2px;
    font-family:inherit;
  }
  .pagenav button:hover{color:var(--ink)}
  .pagenav button.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* 各ページ共通 */
  .page{display:none}
  .page.active{display:block}
  .page-head{margin-bottom:8px}
  .page-eyebrow{font-size:11px;letter-spacing:.24em;color:var(--gold);font-weight:700}
  .page-head h2{font-size:26px;letter-spacing:.03em;margin-top:6px}
  .page-head p{font-size:13px;color:var(--ink-soft);margin-top:6px;max-width:640px}

  .refresh-row{
    display:flex;align-items:center;gap:12px;margin:20px 0 24px;font-size:12px;color:var(--ink-soft);
  }
  .refresh{
    font-size:13px;padding:8px 18px;font-weight:700;letter-spacing:.06em;
    background:var(--accent);color:#fff;border:none;border-radius:2px;cursor:pointer;
    transition:background .15s;font-family:inherit;
  }
  .refresh:hover{background:var(--accent-dark)}
  .refresh:active{transform:translateY(1px)}

  /* 指標カード */
  .cards{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:1px;background:var(--grid);border:1px solid var(--grid);margin-bottom:32px;
  }
  .card{background:var(--white);padding:22px 24px}
  .card .label{font-size:12px;letter-spacing:.1em;color:var(--ink-soft);font-weight:700}
  .card .unit{font-size:11px;color:var(--gold);margin-left:2px}
  .card .value{
    font-size:36px;font-weight:700;color:var(--ink);
    margin-top:10px;letter-spacing:-.01em;
  }
  .card .delta{font-size:12px;margin-top:6px}
  .up{color:var(--accent)} .down{color:var(--alert)}

  /* テーブル */
  .table-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
  .table-head h3{font-size:16px;letter-spacing:.04em}
  .table-head span{font-size:12px;color:var(--ink-soft)}
  .table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;background:var(--white);font-size:14px;min-width:420px}
  caption{caption-side:top;text-align:left;font-size:11px;color:var(--gold);letter-spacing:.2em;padding-bottom:8px;font-weight:700}
  th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--paper-line)}
  thead th{background:var(--accent);color:var(--white);font-size:12px;letter-spacing:.06em;font-weight:600;border-bottom:none}
  tbody tr:nth-child(even){background:var(--shade)}
  tbody tr.row-other td{color:var(--ink-soft)}
  tbody tr.row-total{background:var(--accent-soft)!important}
  tbody tr.row-total td{font-weight:700;color:var(--ink);border-top:2px solid var(--accent)}
  td.num{text-align:right}
  th.num{text-align:right}
  .row-updated{animation:flash 1s ease-out}
  @keyframes flash{0%{background:#dff3f4}100%{}}

  /* チャート */
  .chart-block{
    background:var(--white);border:1px solid var(--grid);
    padding:20px 22px 14px;margin-bottom:32px;
  }
  .chart-block h3{font-size:15px;letter-spacing:.04em;margin-bottom:2px}
  .chart-block .chart-cap{font-size:11px;color:var(--gold);letter-spacing:.18em;font-weight:700;margin-bottom:14px}
  .chart-svg{width:100%;height:auto;display:block}
  .chart-svg text{font-family:Arial,"Yu Gothic",sans-serif}
  .grid-line{stroke:var(--paper-line);stroke-width:1;opacity:.7}
  .axis-label{fill:#9aa4ad;font-size:12px}
  .legend-label{fill:var(--ink-soft);font-size:12px}
  .bar-rect{fill:var(--accent);transition:width .4s ease,height .4s ease,y .4s ease}
  .bar-track{fill:var(--shade)}
  .bar-value{fill:var(--ink);font-size:12px;font-weight:700}
  .bar-name{fill:var(--ink-soft);font-size:12px}
  .line-path{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round}
  .line-area{fill:var(--accent-soft);opacity:.6}
  .line-dot{fill:var(--white);stroke:var(--accent);stroke-width:2}

  /* ブランドロゴ（Simple Icons をマスクで着色） */
  .sns-logo{
    display:inline-block;width:1.15em;height:1.15em;flex:0 0 auto;
    background-color:var(--brand);vertical-align:-0.22em;
  }
  /* グラフ凡例（ロゴ入り・横一列） */
  .chart-legend{
    display:flex;flex-wrap:wrap;gap:8px 18px;justify-content:center;
    margin-top:16px;padding-top:14px;border-top:1px solid var(--paper-line);
  }
  .legend-item{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft)}
  .legend-item .sns-logo{width:15px;height:15px}
  .legend-txt{line-height:1}
  /* SNSカードのラベルにロゴ */
  .sns-card .label{display:flex;align-items:center;gap:6px}
  .sns-card .label .sns-logo{width:16px;height:16px}
  .sns-card .label .unit{margin-left:auto}
  /* 表内サービス名にロゴ */
  .sns-cell{display:inline-flex;align-items:center;gap:8px}
  .sns-cell .sns-logo{width:16px;height:16px}

  /* ===== ページャー（次へ/戻る＋数字） ===== */
  .pager{
    display:flex;align-items:center;justify-content:center;gap:6px;
    margin-top:40px;padding-top:24px;border-top:1px solid var(--paper-line);
    flex-wrap:wrap;
  }
  .pager button{
    min-width:40px;height:40px;padding:0 12px;font-size:14px;font-weight:700;
    background:var(--white);border:1px solid var(--grid);color:var(--ink-soft);
    cursor:pointer;border-radius:2px;font-family:inherit;
    display:inline-flex;align-items:center;justify-content:center;
  }
  .pager button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .pager button.current{background:var(--accent);border-color:var(--accent);color:#fff}
  .pager button:disabled{opacity:.4;cursor:not-allowed}
  .pager .nav-btn{padding:0 16px}

  /* ===== レスポンシブ ===== */
  /* タブレット */
  @media(max-width:768px){
    .head-inner{padding:12px 18px;gap:6px 14px}
    .logo{font-size:18px}
    .head-sub{font-size:11px}
    main{padding:24px 18px 56px}
    .page-head h2{font-size:22px}
    .card{padding:18px 20px}
    .card .value{font-size:32px}
    .cards{grid-template-columns:repeat(2,1fr)}
    .chart-block{padding:16px 16px 12px}
  }
  /* スマートフォン */
  @media(max-width:520px){
    /* ヘッダーは縦積み・左揃え */
    .head-inner{flex-direction:column;align-items:flex-start;gap:8px;padding:12px 16px}
    .head-account{margin-left:0;width:100%;justify-content:space-between;font-size:12px}
    .logo{font-size:17px}
    main{padding:20px 14px 48px}
    /* 主要指標カードは1列 */
    .cards{grid-template-columns:1fr}
    .card{padding:16px 18px}
    .card .value{font-size:30px}
    /* ページ見出し */
    .page-head h2{font-size:20px}
    .page-eyebrow{font-size:10px;letter-spacing:.18em}
    /* 上部ナビは横スクロールで全タブを保持 */
    .pagenav{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .pagenav button{padding:9px 12px;font-size:12px;white-space:nowrap;flex:0 0 auto}
    /* 更新行 */
    .refresh-row{flex-wrap:wrap;gap:8px}
    /* テーブル見出し */
    .table-head{flex-wrap:wrap;gap:4px}
    .table-head h3{font-size:15px}
    /* ページャーはコンパクトに */
    .pager{gap:4px;margin-top:32px}
    .pager button{min-width:36px;height:36px;font-size:13px;padding:0 8px}
    .pager .nav-btn{padding:0 10px;font-size:12px}
    /* ログインカードは画面幅に追従 */
    .login-wrap{max-width:none;width:100%;margin:24px 0 40px}
    .login-head{padding:22px 22px 4px}
    .login-body{padding:12px 22px 26px}
  }
  /* 小型スマートフォン */
  @media(max-width:380px){
    .logo{font-size:15px}
    .head-sub{display:none}
    .card .value{font-size:26px}
    .page-head h2{font-size:18px}
    .pager button{min-width:32px;height:32px;font-size:12px}
  }
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div class="logo"><span class="mark">◆</span> 統計データ会員ポータル</div>
    <div class="head-sub">STATBASE MEMBER PORTAL</div>
    <!-- 右上：ログイン中アカウント -->
    <div class="head-account" id="headAccount">
      <span class="user">ログイン中：<b id="loginName">HK0001</b> 様</span>
      <button class="logout" id="logoutBtn" type="button">ログアウト</button>
    </div>
  </div>
</header>

<main>

  <!-- ========== ① ログイン ========== -->
  <section class="login-wrap" id="loginView">
    <div class="login-head">
      <div class="login-eyebrow">MEMBER SIGN IN</div>
      <h1>会員ログイン</h1>
    </div>
    <div class="login-body">
      <div class="field">
        <label for="userId">ユーザーID</label>
        <input type="text" id="userId" name="userId" autocomplete="username" placeholder="例：HK0001">
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="パスワードを入力">
      </div>
      <div class="err" id="loginError">IDまたはパスワードが正しくありません。もう一度入力してください。</div>
      <button class="btn" id="loginBtn" type="button">ログイン</button>
    </div>
  </section>

  <!-- ========== ② アプリ（ログイン後） ========== -->
  <section class="app" id="appView">
    <nav class="pagenav" id="pageNav"><!-- JSで生成 --></nav>
    <div id="pageContainer"><!-- JSで生成 --></div>
    <div class="pager" id="pager"><!-- JSで生成 --></div>
  </section>

</main>

<script>
/* =========================================================
   ① ログイン処理
   ========================================================= */
var VALID_ID   = "HK0001";
var VALID_PASS = "1234";

var loginView   = document.getElementById("loginView");
var appView     = document.getElementById("appView");
var headAccount = document.getElementById("headAccount");
var loginError  = document.getElementById("loginError");

function doLogin(){
  var id = document.getElementById("userId").value.trim();
  var pw = document.getElementById("password").value;
  if(id === VALID_ID && pw === VALID_PASS){
    loginError.style.display = "none";
    document.getElementById("loginName").textContent = id;
    loginView.style.display   = "none";
    appView.style.display     = "block";
    headAccount.style.display = "flex";
    goToPage(0);
    window.scrollTo(0,0);
  }else{
    loginError.style.display = "block";
  }
}
document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("password").addEventListener("keydown", function(e){
  if(e.key === "Enter") doLogin();
});
document.getElementById("logoutBtn").addEventListener("click", function(){
  appView.style.display     = "none";
  headAccount.style.display = "none";
  loginView.style.display   = "block";
  document.getElementById("password").value = "";
  window.scrollTo(0,0);
});

/* =========================================================
   ② データページ定義
   各ページは render(el) で描画、refresh(el) で更新時に数値を振り直す。
   ========================================================= */
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function frand(min,max){ return Math.random()*(max-min)+min; }
function fmt(n){ return Math.round(n).toLocaleString("ja-JP"); }
function fmt2(n){ return n.toLocaleString("ja-JP",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function sign(n){ return (n>=0?"+":"") + fmt(n); }
function signF(n,d){ return (n>=0?"+":"") + n.toFixed(d); }

function cardHTML(label, unit, valueId, deltaId){
  return "<div class='card'>"+
    "<div class='label'>"+label+"<span class='unit'>"+unit+"</span></div>"+
    "<div class='value mono' id='"+valueId+"'>—</div>"+
    "<div class='delta up' id='"+deltaId+"'>—</div>"+
  "</div>";
}
function setVal(id, text){ var e=document.getElementById(id); if(e) e.textContent=text; }
function setDelta(id, val, prefix, digits){
  var e=document.getElementById(id); if(!e) return;
  var txt = digits>0 ? signF(val,digits) : sign(val);
  e.textContent = prefix + txt;
  e.className = "delta " + (val>=0 ? "up" : "down");
}

/* ---- SVGチャート描画ヘルパー ---- */
// 横棒グラフ： data = [{name, value}] , valFmt = 値の整形関数
function drawBarChart(id, data, valFmt){
  var el=document.getElementById(id); if(!el) return;
  var W=680, rowH=38, padL=110, padR=70, top=8;
  var H=top + data.length*rowH + 6;
  var max=Math.max.apply(null, data.map(function(d){return d.value;}))*1.05;
  var svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
  data.forEach(function(d,i){
    var y=top + i*rowH;
    var barY=y+8, barH=rowH-18;
    var full=W-padL-padR;
    var w=Math.max(2, full * (d.value/max));
    svg+='<text class="bar-name" x="'+(padL-10)+'" y="'+(barY+barH/2+4)+'" text-anchor="end">'+d.name+'</text>';
    svg+='<rect class="bar-track" x="'+padL+'" y="'+barY+'" width="'+full+'" height="'+barH+'" rx="2"/>';
    svg+='<rect class="bar-rect" x="'+padL+'" y="'+barY+'" width="'+w+'" height="'+barH+'" rx="2"/>';
    svg+='<text class="bar-value" x="'+(padL+w+8)+'" y="'+(barY+barH/2+4)+'">'+valFmt(d.value)+'</text>';
  });
  svg+='</svg>';
  el.innerHTML=svg;
}

// 折れ線グラフ： values = [数値...]（時系列）
function drawLineChart(id, values, valFmt){
  var el=document.getElementById(id); if(!el) return;
  var W=680, H=240, padL=54, padR=16, padT=18, padB=28;
  var plotW=W-padL-padR, plotH=H-padT-padB;
  var min=Math.min.apply(null,values), max=Math.max.apply(null,values);
  var span=(max-min)||1; min-=span*0.15; max+=span*0.15; span=max-min;
  var n=values.length;
  function X(i){ return padL + plotW*(i/(n-1)); }
  function Y(v){ return padT + plotH*(1-(v-min)/span); }
  var svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
  // 目盛り線＋Y軸ラベル
  for(var g=0;g<=4;g++){
    var gv=min+span*(g/4), gy=Y(gv);
    svg+='<line class="grid-line" x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'"/>';
    svg+='<text class="axis-label" x="'+(padL-8)+'" y="'+(gy+4)+'" text-anchor="end">'+valFmt(gv)+'</text>';
  }
  // エリア
  var area='M '+X(0)+' '+(padT+plotH);
  values.forEach(function(v,i){ area+=' L '+X(i)+' '+Y(v); });
  area+=' L '+X(n-1)+' '+(padT+plotH)+' Z';
  svg+='<path class="line-area" d="'+area+'"/>';
  // ライン
  var line='M '+X(0)+' '+Y(values[0]);
  values.forEach(function(v,i){ if(i>0) line+=' L '+X(i)+' '+Y(v); });
  svg+='<path class="line-path" d="'+line+'"/>';
  // 末尾ドット
  svg+='<circle class="line-dot" cx="'+X(n-1)+'" cy="'+Y(values[n-1])+'" r="4"/>';
  svg+='</svg>';
  el.innerHTML=svg;
}

function chartBlock(title, cap, chartId){
  return "<div class='chart-block'><h3>"+title+"</h3>"+
    "<div class='chart-cap'>"+cap+"</div>"+
    "<div id='"+chartId+"'></div></div>";
}

/* ---- SNSブランド設定（ブランドカラー＋Simple Iconsスラグ） ---- */
var SNS_COLORS={fb:"#1877F2",yt:"#FF0000",wa:"#25D366",ig:"#E4405F",tt:"#00C4CC",x:"#111111"};
var SNS_SLUGS ={fb:"facebook",yt:"youtube",wa:"whatsapp",ig:"instagram",tt:"tiktok",x:"x"};
// Simple Icons CDN（jsDelivr）のロゴを、ブランドカラーで着色したマスク付き円アイコンとして返す
function logoSpan(k){
  var url="https://cdn.jsdelivr.net/npm/simple-icons@v13/icons/"+SNS_SLUGS[k]+".svg";
  return "<span class='sns-logo' style=\"--brand:"+SNS_COLORS[k]+";"+
    "-webkit-mask:url('"+url+"') center/62% no-repeat;mask:url('"+url+"') center/62% no-repeat;\"></span>";
}
// SNS指標カード（ロゴ付き）
function snsCard(k, label, valueId, deltaId){
  return "<div class='card sns-card'>"+
    "<div class='label'>"+logoSpan(k)+"<span>"+label+"</span><span class='unit'>百万</span></div>"+
    "<div class='value mono' id='"+valueId+"'>—</div>"+
    "<div class='delta up' id='"+deltaId+"'>—</div>"+
  "</div>";
}

// X軸ラベル付き折れ線： data=[{year,pop}] , valFmt=Y値整形 , xFmt=X軸整形
function drawLineChartXY(id, data, valFmt, xFmt, opts){
  var el=document.getElementById(id); if(!el) return;
  opts=opts||{};
  var W=680, H=280, padL=58, padR=18, padT=18, padB=40;
  var plotW=W-padL-padR, plotH=H-padT-padB;
  var vals=data.map(function(d){return d.pop;});
  var min=(opts.min!==undefined)?opts.min:0;
  var max;
  if(opts.max!==undefined){ max=opts.max; }
  else { max=Math.max.apply(null,vals); var sp0=(max-min)||1; max+=sp0*0.08; }
  var span=(max-min)||1;
  var ticks=opts.ticks||4;               // 目盛り区間数
  var labelStep=opts.labelStep||1;       // X軸ラベルを何点ごとに出すか
  var n=data.length;
  function X(i){ return padL + plotW*(i/(n-1)); }
  function Y(v){ return padT + plotH*(1-(v-min)/span); }
  var svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
  for(var g=0;g<=ticks;g++){
    var gv=min+span*(g/ticks), gy=Y(gv);
    svg+='<line class="grid-line" x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'"/>';
    svg+='<text class="axis-label" x="'+(padL-8)+'" y="'+(gy+4)+'" text-anchor="end">'+valFmt(gv)+'</text>';
  }
  data.forEach(function(d,i){
    if(i%labelStep===0 || i===n-1)
      svg+='<text class="axis-label" x="'+X(i)+'" y="'+(H-14)+'" text-anchor="middle">'+xFmt(d.year)+'</text>';
  });
  var area='M '+X(0)+' '+(padT+plotH);
  data.forEach(function(d,i){ area+=' L '+X(i)+' '+Y(d.pop); });
  area+=' L '+X(n-1)+' '+(padT+plotH)+' Z';
  svg+='<path class="line-area" d="'+area+'"/>';
  var line='M '+X(0)+' '+Y(data[0].pop);
  data.forEach(function(d,i){ if(i>0) line+=' L '+X(i)+' '+Y(d.pop); });
  svg+='<path class="line-path" d="'+line+'"/>';
  data.forEach(function(d,i){
    svg+='<circle class="line-dot" cx="'+X(i)+'" cy="'+Y(d.pop)+'" r="3"/>';
  });
  svg+='</svg>';
  el.innerHTML=svg;
}

// 複数系列折れ線： series=[{name,color,values:[...]}] , years=[...] , valFmt
function drawMultiLineChart(id, years, series, valFmt, opts){
  var el=document.getElementById(id); if(!el) return;
  opts=opts||{};
  var W=680, H=300, padL=54, padR=22, padT=18, padB=34;
  var plotW=W-padL-padR, plotH=H-padT-padB;
  var allVals=[]; series.forEach(function(s){ allVals=allVals.concat(s.values); });
  var min=(opts.min!==undefined)?opts.min:0;
  var max=(opts.max!==undefined)?opts.max:Math.max.apply(null,allVals)*1.08;
  var span=(max-min)||1;
  var ticks=opts.ticks||4, labelStep=opts.labelStep||1;
  var n=years.length;
  function X(i){ return padL + plotW*(i/(n-1)); }
  function Y(v){ return padT + plotH*(1-(v-min)/span); }
  var svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
  // 横グリッド（極細）とY軸ラベル
  for(var g=0;g<=ticks;g++){
    var gv=min+span*(g/ticks), gy=Y(gv);
    svg+='<line class="grid-line" x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'"/>';
    svg+='<text class="axis-label" x="'+(padL-10)+'" y="'+(gy+4)+'" text-anchor="end">'+valFmt(gv)+'</text>';
  }
  // X軸ラベル
  years.forEach(function(y,i){
    if(i%labelStep===0 || i===n-1)
      svg+='<text class="axis-label" x="'+X(i)+'" y="'+(padT+plotH+20)+'" text-anchor="middle">'+y+'</text>';
  });
  // 各系列：なめらかな曲線＋末端ドット＋末端ラベル
  series.forEach(function(s){
    var pts=[];
    s.values.forEach(function(v,i){ if(v!==null&&v!==undefined) pts.push([X(i),Y(v),v]); });
    if(pts.length===0) return;
    // Catmull-Rom → ベジェでスムージング
    var d='M '+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
    for(var i=0;i<pts.length-1;i++){
      var p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
      var c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
      var c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
      d+=' C '+c1x.toFixed(1)+' '+c1y.toFixed(1)+' '+c2x.toFixed(1)+' '+c2y.toFixed(1)+' '+p2[0].toFixed(1)+' '+p2[1].toFixed(1);
    }
    svg+='<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.92"/>';
    // 末端ドット（白フチ）
    var last=pts[pts.length-1];
    svg+='<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="3.5" fill="'+s.color+'" stroke="#fff" stroke-width="1.5"/>';
  });
  svg+='</svg>';
  el.innerHTML=svg;
}

    var s=this.state;

    var prevUnits=s.units;
    s.units=Math.max(0,s.units+dU); s.unitprice=Math.max(1,s.unitprice+dP);
    dU=s.units-prevUnits;                 // クランプ後の実増減
    s.total+=dT; s.sales=s.units*s.unitprice;
    setVal("m0-members",fmt(s.units));  setVal("m0-access",fmt(s.sales));
    setVal("m0-index",fmt(s.unitprice)); setVal("m0-rate",fmt(s.total));
    setDelta("d0-members",dU,"前日比 ",0); setDelta("d0-access",dU*s.unitprice,"前日比 ",0);
    setDelta("d0-index",dP,"前日比 ",0);   setDelta("d0-rate",dT,"前日比 ",0);

    // 本日の販売台数(s.units)を、baseの比率で各項目に按分。端数は最後の行(その他)で吸収し、
    // 合計が必ず s.units に一致するようにする。前日比も同様に配分し合計=dU に一致させる。
    function allocate(items, total, totalDelta){
      var sumBase=items.reduce(function(a,c){return a+c.base;},0);
      var out=[], acc=0, accD=0;
      for(var i=0;i<items.length;i++){
        var v, d;
        if(i===items.length-1){ v=total-acc; d=totalDelta-accD; }   // 最後で辻褄合わせ
        else{
          v=Math.round(total*(items[i].base/sumBase));
          d=Math.round(totalDelta*(items[i].base/sumBase));
          acc+=v; accD+=d;
        }
        // 微妙なゆらぎを持たせつつ合計は保持（最後の行で吸収されるため崩れない）
        out.push({code:items[i].code, name:items[i].name, val:Math.max(0,v), delta:d});
      }
      return out;
    }
    function renderRows(bodyId, rows, total, totalDelta, otherCode, chartId){

        var share=(total>0 ? r.val/total*100 : 0).toFixed(1);

          "<td class='num mono'>"+share+"</td>";

        "<td class='num mono'>"+fmt(total)+"</td>"+
        "<td class='num mono "+(totalDelta>=0?"up":"down")+"'>"+sign(totalDelta)+"</td>"+
        "<td class='num mono'>100.0</td>";
      body.appendChild(tr);
      drawBarChart(chartId, chart, function(v){return fmt(v);});
    }

    // カテゴリ別・企業別ともに本日の販売台数を按分（合計は必ず s.units、前日比合計は dU）
    var catRows=allocate(this.categories, s.units, dU);

      wa:[null, 70, 900, 1800, this.state.wa, 2300],
      ig:[null, 1, 400, 1400, this.state.ig, 2400],
      tt:[null, null, 55, 1000, this.state.tt, 2000],
      x:[null, 30, 305, 350, this.state.x, 700]
    };
    var series=keys.map(function(k){
      return {name:names[k], color:colors[k], values:hist[k]};
    });
    drawMultiLineChart("chart3", years, series,
      function(v){return fmt(v);},
      {min:0, max:3500, ticks:5, labelStep:1});
    // ロゴ入り凡例（テキストもブランドカラー）
    var lg=document.getElementById("legend3");
    if(lg){
      lg.innerHTML = keys.map(function(k){
        return "<span class='legend-item'>"+logoSpan(k)+
          "<span class='legend-txt' style='color:"+colors[k]+"'>"+names[k]+"</span></span>";
      }).join("");
    }
  }
}

];

/* =========================================================
   ③ ページ描画・ナビ・ページャー
   ========================================================= */
var current = 0;
var pageNav       = document.getElementById("pageNav");
var pageContainer = document.getElementById("pageContainer");
var pager         = document.getElementById("pager");

PAGES.forEach(function(p,i){
  var b=document.createElement("button");
  b.type="button"; b.textContent=p.nav;
  b.addEventListener("click",function(){ goToPage(i); });
  pageNav.appendChild(b);
});

function buildPage(i){
  var existing=document.getElementById("page-"+i);
  if(existing) return existing;
  var p=PAGES[i];
  var sec=document.createElement("section");
  sec.className="page"; sec.id="page-"+i;
  sec.innerHTML=
    "<div class='page-head'><div class='page-eyebrow'>"+p.eyebrow+"</div>"+
    "<h2>"+p.title+"</h2>"+(p.desc ? "<p>"+p.desc+"</p>" : "")+"</div>"+
    "<div class='refresh-row'><button class='refresh' type='button'>データを更新</button>"+
    "<span>最終更新：<span class='mono' id='upd-"+i+"'>—</span></span></div>"+
    "<div class='page-body' id='body-"+i+"'></div>";
  pageContainer.appendChild(sec);
  var body=sec.querySelector("#body-"+i);
  p.render(body);
  stampTime(i);
  sec.querySelector(".refresh").addEventListener("click",function(){
    PAGES[i].refresh(document.getElementById("body-"+i));
    stampTime(i);
  });
  return sec;
}

function stampTime(i){
  var e=document.getElementById("upd-"+i); if(!e) return;
  var n=new Date();
  e.textContent=String(n.getHours()).padStart(2,"0")+":"+
    String(n.getMinutes()).padStart(2,"0")+":"+String(n.getSeconds()).padStart(2,"0");
}

function goToPage(i){
  if(i<0||i>=PAGES.length) return;
  current=i;
  buildPage(i);
  PAGES.forEach(function(_,idx){
    var el=document.getElementById("page-"+idx);
    if(el) el.classList.toggle("active", idx===i);
  });
  Array.prototype.forEach.call(pageNav.children,function(b,idx){
    b.classList.toggle("active", idx===i);
  });
  renderPager();
  window.scrollTo(0,0);
}

function renderPager(){
  pager.innerHTML="";
  var prev=document.createElement("button");
  prev.type="button"; prev.className="nav-btn"; prev.textContent="← 戻る";
  prev.disabled=(current===0);
  prev.addEventListener("click",function(){ goToPage(current-1); });
  pager.appendChild(prev);

  PAGES.forEach(function(_,idx){
    var b=document.createElement("button");
    b.type="button"; b.textContent=(idx+1);
    if(idx===current) b.className="current";
    b.addEventListener("click",function(){ goToPage(idx); });
    pager.appendChild(b);
  });

  var next=document.createElement("button");
  next.type="button"; next.className="nav-btn"; next.textContent="次へ →";
  next.disabled=(current===PAGES.length-1);
  next.addEventListener("click",function(){ goToPage(current+1); });
  pager.appendChild(next);
}
</script>
